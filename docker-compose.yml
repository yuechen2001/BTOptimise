services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - '5050:5050'
        environment:
            - PORT=5050
            - MONGO_URI=${MONGO_URI}
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - '80:80'
        depends_on:
            - backend
        restart: unless-stopped
